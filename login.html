<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f4f4f4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 35px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: green;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        #message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email" autocomplete="off">
    <input type="password" id="password" placeholder="Enter Password" autocomplete="off">

    <!-- FIX: button now calls function -->
    <button type="button" onclick="loginUser()">Login</button>

    <p id="message"></p>

    <div class="register-link">
        Don't have an account?
        <a href="/register-page">Register</a>
    </div>

</div>

<script>
async function loginUser() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    // basic validation
    if (!email || !password) {
        msg.style.color = "red";
        msg.innerText = "Please fill all fields";
        return;
    }

    msg.style.color = "black";
    msg.innerText = "Logging in...";

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {

            localStorage.setItem("user_id", data.user_id);
            localStorage.setItem("username", data.username);

            msg.style.color = "green";
            msg.innerText = "Login successful! Redirecting...";

            // immediate redirect (no delay issues)
            window.location.href = "/dashboard";

        } else {
            msg.style.color = "red";
            msg.innerText = data.message || "Invalid credentials";
        }

    } catch (error) {
        msg.style.color = "red";
        msg.innerText = "Server error. Try again.";
        console.error(error);
    }
}
</script>

</body>
</html>
